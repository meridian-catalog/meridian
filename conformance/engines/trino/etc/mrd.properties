# Meridian REST catalog for the Trino smoke test.
#
# The container runs on the default bridge network: unlike the Iceberg
# Java REST client (Spark/Flink smokes), Trino's native S3 file system
# is configured purely from these catalog properties when
# vended-credentials-enabled=false, so the client-side s3.endpoint
# override below actually sticks and host networking is not needed.
connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://host.docker.internal:8181/iceberg
iceberg.rest-catalog.warehouse=spark_smoke
iceberg.rest-catalog.vended-credentials-enabled=false
fs.native-s3.enabled=true
s3.endpoint=http://host.docker.internal:9000
s3.path-style-access=true
s3.region=us-east-1
s3.aws-access-key=meridian
s3.aws-secret-key=meridian123
