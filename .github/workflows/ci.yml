name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PRs; never cancel main builds.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint (rustfmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (workspace)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: meridian
          POSTGRES_PASSWORD: meridian
          POSTGRES_DB: meridian
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Database-backed tests in meridian-store read this; without it they
      # skip, so setting it here is what makes CI actually exercise them.
      DATABASE_URL: postgres://meridian:meridian@localhost:5432/meridian
      # Cap each test binary's connection pool so the several binaries cargo
      # runs in parallel stay well under Postgres's connection limit.
      MERIDIAN__DATABASE__MAX_CONNECTIONS: 5
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --workspace --locked

  docker:
    name: Docker build
    # Image build is comparatively slow and the Dockerfile only changes
    # rarely; build it on pushes to main, not on every PR.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The release build compiles Arrow/Parquet (pulled in by the compaction
      # executor), which is memory-hungry and OOM-kills the compiler on the
      # runner's 7 GB. Extra swap lets it complete without raising parallelism.
      - name: Add build swap
        run: |
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile
          sudo fallocate -l 12G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Bound compiler parallelism inside the build: buildx runs in a
          # container where the host swap added above is not a reliable
          # backstop, and the kernel OOM-killer intermittently kills rustc
          # on the Arrow/Parquet release compile. Two jobs fit the runner.
          build-args: |
            BUILD_JOBS=2
