name: Feature request
description: Suggest an idea or improvement for Meridian
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. A clear problem statement helps us
        understand the need behind the request.

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem statement
      description: >-
        What problem are you trying to solve? Describe the use case and why the
        current behavior is insufficient.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: How you think this could be addressed. Leave blank if you are not sure.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have considered or tried.
    validations:
      required: false

  - type: textarea
    id: affected-scope
    attributes:
      label: Affected engines / deployment modes
      description: >-
        Which query engines (e.g. Spark, Trino, DuckDB) and/or deployment modes
        this request affects, if applicable.
    validations:
      required: false

  - type: dropdown
    id: contribution
    attributes:
      label: Willingness to contribute
      description: Would you be willing to work on this feature yourself?
      options:
        - "Yes, I can contribute this"
        - "Yes, with guidance from maintainers"
        - "No"
    validations:
      required: false
